
<script>
// Connect to OWOT WebSocket
const ws = new WebSocket("wss://ourworldoftext.com/ws/");

// Track connection state
let connected = false;

ws.onopen = () => {
    document.title = "Connected to OWOT WebSocket";
    connected = true;
};

ws.onclose = () => {
    document.title = "Disconnected from OWOT";
    connected = false;
};

ws.onerror = (err) => {
    console.error("WebSocket error:", err);
};

// Send a character to OWOT
function writeCharToXY(char, color, x, y) {
    if (!connected || ws.readyState !== WebSocket.OPEN) return;

    const tileX = Math.floor(x / 16);
    const tileY = Math.floor(y / 16);
    const charX = ((x % 16) + 16) % 16;
    const charY = ((y % 16) + 16) % 16;

    const edit = [
        tileX,
        tileY,
        charX,
        charY,
        Date.now(),   // ✅ required timestamp
        char,         // ✅ actual character (string)
        color || 0
    ];

    ws.send(JSON.stringify({
        kind: "write",
        edits: [edit]
    }));
}

// Write string helper (FIXED again) fuck
function writeText(text, posList, color) {
    if (!connected || ws.readyState !== WebSocket.OPEN) return;

    let x = posList[0];
    let y = posList[1];
    const startX = x;

    const edits = [];

    for (let char of text) {
        if (char === "\n") {
            y++;
            x = startX;
            continue;
        }

        const tileX = Math.floor(x / 16);
        const tileY = Math.floor(y / 16);
        const charX = ((x % 16) + 16) % 16;
        const charY = ((y % 16) + 16) % 16;

        edits.push([
            tileX,
            tileY,
            charX,
            charY,
            Date.now(), // ✅ timestamp
            char,       // ✅ string, not charCode
            color || 0
        ]);

        x++;
    }

    ws.send(JSON.stringify({
        kind: "write",
        edits: edits
    }));
}

// Time formatting
function getFormattedUTCTime() {
    const now = new Date();
    const year = now.getUTCFullYear();
    const month = String(now.getUTCMonth() + 1).padStart(2, '0');
    const day = String(now.getUTCDate()).padStart(2, '0');
    let hours = now.getUTCHours();
    const minutes = String(now.getUTCMinutes()).padStart(2, '0');
    const seconds = String(now.getUTCSeconds()).padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    return `${year}-${month}-${day} ${hours}:${minutes}:${seconds} ${ampm}`;
}

// Stylize numbers
function stylize(text) {
    return text.toString()
        .replaceAll("0", "🯰")
        .replaceAll("1", "🯱")
        .replaceAll("2", "🯲")
        .replaceAll("3", "🯳")
        .replaceAll("4", "🯴")
        .replaceAll("5", "🯵")
        .replaceAll("6", "🯶")
        .replaceAll("7", "🯷")
        .replaceAll("8", "🯸")
        .replaceAll("9", "🯹");
}

let refreshCounter = 0;

// Main loop
setInterval(function () {
    if (!connected) return;

    writeText("https://halohash.github.io/worldofhash", [-27, 14], 0);
    writeText("Current UTC Time: " + stylize(getFormattedUTCTime()), [-27, 15], 0);
    writeText("Status: Online", [-27, 16], 0);
    writeText("Last Raided By: Kurdistan/PKK", [-27, 17], 0);
    writeText("Refresh Count: " + refreshCounter, [-27, 18], 0);
    writeText("Clock Engine Version: 2.3", [-27, 19], 0);
    writeText("HashNews: after 10 years rec room is expected to die on its 10th year", [-27, 20], 0);

    refreshCounter += 1;
}, 1000);
</script>
